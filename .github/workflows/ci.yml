name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write

jobs:
  # ---------------------------------------------------------------------------
  # Detect which services changed to avoid running unnecessary jobs
  # ---------------------------------------------------------------------------
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
      gateway: ${{ steps.filter.outputs.gateway }}
      portal: ${{ steps.filter.outputs.portal }}
      infra: ${{ steps.filter.outputs.infra }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'frontend/**'
            backend:
              - 'backend/**'
            gateway:
              - 'gateway/**'
            portal:
              - 'portal/**'
            infra:
              - 'infra/**'

  # ---------------------------------------------------------------------------
  # Frontend: lint, format check, test, build
  # ---------------------------------------------------------------------------
  frontend:
    name: Frontend
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: frontend/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Check formatting
        run: pnpm run format:check

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm run build
        env:
          NEXT_PUBLIC_AUTH_MODE: keycloak
          BACKEND_URL: http://localhost:8080

  # ---------------------------------------------------------------------------
  # Backend: format check, test, build
  # ---------------------------------------------------------------------------
  backend:
    name: Backend
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "25"
          cache: "maven"

      - name: Check formatting
        run: ./mvnw spotless:check

      - name: Test
        run: ./mvnw test

      - name: Build
        run: ./mvnw clean package -DskipTests

  # ---------------------------------------------------------------------------
  # Gateway: format check, test, build
  # ---------------------------------------------------------------------------
  gateway:
    name: Gateway
    needs: changes
    if: needs.changes.outputs.gateway == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gateway
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "25"
          cache: "maven"

      - name: Check formatting
        run: ./mvnw spotless:check

      - name: Test
        run: ./mvnw test

      - name: Build
        run: ./mvnw clean package -DskipTests

  # ---------------------------------------------------------------------------
  # Portal: lint, test, build
  # ---------------------------------------------------------------------------
  portal:
    name: Portal
    needs: changes
    if: needs.changes.outputs.portal == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: portal
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: portal/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm run build

  # ---------------------------------------------------------------------------
  # Terraform: validate infra configuration
  # ---------------------------------------------------------------------------
  terraform-validate:
    name: Terraform Validate
    needs: changes
    if: needs.changes.outputs.infra == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      - name: Init
        run: terraform init -backend=false

      - name: Validate
        run: terraform validate

      - name: Format check
        run: terraform fmt -check -recursive
