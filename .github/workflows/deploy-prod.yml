name: Deploy Production

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to deploy (SHA, branch, or tag)"
        required: false
        default: "main"
      confirm:
        description: 'Type "deploy-prod" to confirm production deployment'
        required: true

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: af-south-1
  ECS_CLUSTER: kazi-production

jobs:
  # ---------------------------------------------------------------------------
  # Safety check: require explicit confirmation and resolve Git SHA
  # ---------------------------------------------------------------------------
  validate:
    name: Validate confirmation
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.sha.outputs.sha }}
    steps:
      - name: Check confirmation input
        env:
          CONFIRM: ${{ inputs.confirm }}
        run: |
          if [ "$CONFIRM" != "deploy-prod" ]; then
            echo "::error::Confirmation failed. You must type 'deploy-prod' to proceed."
            exit 1
          fi
          echo "Confirmation accepted."

      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Get full SHA
        id: sha
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------------------
  # Promote 4 images from staging by re-tagging (no rebuild)
  # ---------------------------------------------------------------------------
  promote-images:
    name: Promote Images
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: GitHubActions-PromoteImages
          aws-region: ${{ env.AWS_REGION }}

      - id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Promote backend, gateway, portal, keycloak
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          SHA: ${{ needs.validate.outputs.sha }}
        run: |
          for svc in backend gateway portal keycloak; do
            echo "--- Promoting ${svc} ---"
            docker pull "${REGISTRY}/kazi/${svc}:staging"
            docker tag "${REGISTRY}/kazi/${svc}:staging" "${REGISTRY}/kazi/${svc}:production"
            docker tag "${REGISTRY}/kazi/${svc}:staging" "${REGISTRY}/kazi/${svc}:${SHA}"
            docker push "${REGISTRY}/kazi/${svc}:production"
            docker push "${REGISTRY}/kazi/${svc}:${SHA}"
            echo "${svc} promoted to production and ${SHA}."
          done

  # ---------------------------------------------------------------------------
  # Rebuild frontend with production NEXT_PUBLIC_* build args
  # ---------------------------------------------------------------------------
  build-frontend:
    name: Build Frontend
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.validate.outputs.sha }}

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: GitHubActions-BuildFrontendProd
          aws-region: ${{ env.AWS_REGION }}

      - id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: frontend
          push: true
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/kazi/frontend:${{ needs.validate.outputs.sha }}
            ${{ steps.ecr-login.outputs.registry }}/kazi/frontend:production
          build-args: |
            NEXT_PUBLIC_AUTH_MODE=keycloak
            NEXT_PUBLIC_GATEWAY_URL=https://app.heykazi.com/bff
          cache-from: type=gha,scope=frontend-prod
          cache-to: type=gha,mode=max,scope=frontend-prod

  # ---------------------------------------------------------------------------
  # Deploy all 5 services to production ECS cluster
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to ECS
    needs: [validate, promote-images, build-frontend]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: GitHubActions-DeployProduction
          aws-region: ${{ env.AWS_REGION }}

      - id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Deploy frontend
        uses: ./.github/actions/ecs-deploy
        with:
          cluster: ${{ env.ECS_CLUSTER }}
          service: kazi-production-frontend
          task-definition-family: kazi-production-frontend
          container-name: frontend
          image: ${{ steps.ecr-login.outputs.registry }}/kazi/frontend:${{ needs.validate.outputs.sha }}

      - name: Deploy backend
        uses: ./.github/actions/ecs-deploy
        with:
          cluster: ${{ env.ECS_CLUSTER }}
          service: kazi-production-backend
          task-definition-family: kazi-production-backend
          container-name: backend
          image: ${{ steps.ecr-login.outputs.registry }}/kazi/backend:${{ needs.validate.outputs.sha }}

      - name: Deploy gateway
        uses: ./.github/actions/ecs-deploy
        with:
          cluster: ${{ env.ECS_CLUSTER }}
          service: kazi-production-gateway
          task-definition-family: kazi-production-gateway
          container-name: gateway
          image: ${{ steps.ecr-login.outputs.registry }}/kazi/gateway:${{ needs.validate.outputs.sha }}

      - name: Deploy portal
        uses: ./.github/actions/ecs-deploy
        with:
          cluster: ${{ env.ECS_CLUSTER }}
          service: kazi-production-portal
          task-definition-family: kazi-production-portal
          container-name: portal
          image: ${{ steps.ecr-login.outputs.registry }}/kazi/portal:${{ needs.validate.outputs.sha }}

      - name: Deploy keycloak
        uses: ./.github/actions/ecs-deploy
        with:
          cluster: ${{ env.ECS_CLUSTER }}
          service: kazi-production-keycloak
          task-definition-family: kazi-production-keycloak
          container-name: keycloak
          image: ${{ steps.ecr-login.outputs.registry }}/kazi/keycloak:${{ needs.validate.outputs.sha }}

  # ---------------------------------------------------------------------------
  # Production smoke tests — verify URLs respond after deployment
  # ---------------------------------------------------------------------------
  smoke-test:
    name: Smoke Test
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Check frontend (200 OK)
        run: |
          echo "Checking frontend at https://app.heykazi.com/ ..."
          curl -sf --retry 5 --retry-delay 15 --max-time 30 "https://app.heykazi.com/" > /dev/null
          echo "Frontend is healthy."

      - name: Check gateway (expect 401 — gateway is working)
        run: |
          echo "Checking gateway at https://app.heykazi.com/bff/me ..."
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --retry 5 --retry-delay 15 --max-time 30 "https://app.heykazi.com/bff/me")
          if [ "$HTTP_CODE" = "401" ] || [ "$HTTP_CODE" = "200" ]; then
            echo "Gateway is healthy (HTTP ${HTTP_CODE})."
          else
            echo "::error::Gateway returned unexpected HTTP ${HTTP_CODE}"
            exit 1
          fi

      - name: Check keycloak health
        run: |
          echo "Checking keycloak at https://auth.heykazi.com/health/ready ..."
          curl -sf --retry 5 --retry-delay 15 --max-time 30 "https://auth.heykazi.com/health/ready" > /dev/null
          echo "Keycloak is healthy."

      - name: Check portal (200 OK)
        run: |
          echo "Checking portal at https://portal.heykazi.com/ ..."
          curl -sf --retry 5 --retry-delay 15 --max-time 30 "https://portal.heykazi.com/" > /dev/null
          echo "Portal is healthy."

      - name: Post smoke test results to summary
        if: always()
        run: |
          echo "## Production Smoke Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Service | URL | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---------|-----|--------|" >> "$GITHUB_STEP_SUMMARY"

          for url in \
            "https://app.heykazi.com/" \
            "https://app.heykazi.com/bff/me" \
            "https://auth.heykazi.com/health/ready" \
            "https://portal.heykazi.com/"; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$url" 2>/dev/null || echo "ERR")
            if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "401" ]; then
              echo "| ${url} | ${url} | :white_check_mark: ${HTTP_CODE} |" >> "$GITHUB_STEP_SUMMARY"
            else
              echo "| ${url} | ${url} | :x: ${HTTP_CODE} |" >> "$GITHUB_STEP_SUMMARY"
            fi
          done
