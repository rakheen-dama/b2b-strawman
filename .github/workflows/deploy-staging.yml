name: Deploy Staging

on:
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: af-south-1
  ECS_CLUSTER: kazi-staging

jobs:
  # ---------------------------------------------------------------------------
  # Detect which services changed to skip unnecessary builds
  # ---------------------------------------------------------------------------
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
      gateway: ${{ steps.filter.outputs.gateway }}
      portal: ${{ steps.filter.outputs.portal }}
      keycloak: ${{ steps.filter.outputs.keycloak }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'frontend/**'
            backend:
              - 'backend/**'
            gateway:
              - 'gateway/**'
            portal:
              - 'portal/**'
            keycloak:
              - 'compose/keycloak/**'

  # ---------------------------------------------------------------------------
  # Build and push frontend Docker image to ECR
  # ---------------------------------------------------------------------------
  build-frontend:
    name: Build Frontend
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: GitHubActions-BuildFrontend
          aws-region: ${{ env.AWS_REGION }}

      - id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: frontend
          push: true
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/kazi/frontend:${{ github.sha }}
            ${{ steps.ecr-login.outputs.registry }}/kazi/frontend:staging
          build-args: |
            NEXT_PUBLIC_AUTH_MODE=keycloak
            NEXT_PUBLIC_GATEWAY_URL=https://staging-app.heykazi.com/bff
          cache-from: type=gha,scope=frontend-staging
          cache-to: type=gha,mode=max,scope=frontend-staging

  # ---------------------------------------------------------------------------
  # Build and push backend Docker image to ECR
  # ---------------------------------------------------------------------------
  build-backend:
    name: Build Backend
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: GitHubActions-BuildBackend
          aws-region: ${{ env.AWS_REGION }}

      - id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: backend
          push: true
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/kazi/backend:${{ github.sha }}
            ${{ steps.ecr-login.outputs.registry }}/kazi/backend:staging
          cache-from: type=gha,scope=backend-staging
          cache-to: type=gha,mode=max,scope=backend-staging

  # ---------------------------------------------------------------------------
  # Build and push gateway Docker image to ECR
  # ---------------------------------------------------------------------------
  build-gateway:
    name: Build Gateway
    needs: changes
    if: needs.changes.outputs.gateway == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: GitHubActions-BuildGateway
          aws-region: ${{ env.AWS_REGION }}

      - id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: gateway
          push: true
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/kazi/gateway:${{ github.sha }}
            ${{ steps.ecr-login.outputs.registry }}/kazi/gateway:staging
          cache-from: type=gha,scope=gateway-staging
          cache-to: type=gha,mode=max,scope=gateway-staging

  # ---------------------------------------------------------------------------
  # Build and push portal Docker image to ECR
  # ---------------------------------------------------------------------------
  build-portal:
    name: Build Portal
    needs: changes
    if: needs.changes.outputs.portal == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: GitHubActions-BuildPortal
          aws-region: ${{ env.AWS_REGION }}

      - id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: portal
          push: true
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/kazi/portal:${{ github.sha }}
            ${{ steps.ecr-login.outputs.registry }}/kazi/portal:staging
          build-args: |
            NEXT_PUBLIC_PORTAL_API_URL=https://staging-portal.heykazi.com/api
          cache-from: type=gha,scope=portal-staging
          cache-to: type=gha,mode=max,scope=portal-staging

  # ---------------------------------------------------------------------------
  # Build and push keycloak Docker image to ECR
  # ---------------------------------------------------------------------------
  build-keycloak:
    name: Build Keycloak
    needs: changes
    if: needs.changes.outputs.keycloak == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: GitHubActions-BuildKeycloak
          aws-region: ${{ env.AWS_REGION }}

      - id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: compose/keycloak
          file: compose/keycloak/Dockerfile.production
          push: true
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/kazi/keycloak:${{ github.sha }}
            ${{ steps.ecr-login.outputs.registry }}/kazi/keycloak:staging
          cache-from: type=gha,scope=keycloak-staging
          cache-to: type=gha,mode=max,scope=keycloak-staging

  # ---------------------------------------------------------------------------
  # Deploy all 5 services to ECS (always runs, even if build was skipped)
  # Uses github.sha tag for rebuilt services, staging tag for unchanged ones
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to ECS
    needs: [changes, build-frontend, build-backend, build-gateway, build-portal, build-keycloak]
    if: always() && !cancelled() && !contains(needs.*.result, 'failure')
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: GitHubActions-DeployStaging
          aws-region: ${{ env.AWS_REGION }}

      - id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Resolve image tags
        id: tags
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          SHA: ${{ github.sha }}
          FRONTEND_CHANGED: ${{ needs.changes.outputs.frontend }}
          BACKEND_CHANGED: ${{ needs.changes.outputs.backend }}
          GATEWAY_CHANGED: ${{ needs.changes.outputs.gateway }}
          PORTAL_CHANGED: ${{ needs.changes.outputs.portal }}
          KEYCLOAK_CHANGED: ${{ needs.changes.outputs.keycloak }}
        run: |
          # Use SHA tag for rebuilt services, staging tag for unchanged ones
          for svc in frontend backend gateway portal keycloak; do
            var_name="${svc^^}_CHANGED"
            changed="${!var_name}"
            if [ "$changed" = "true" ]; then
              echo "${svc}=${REGISTRY}/kazi/${svc}:${SHA}" >> "$GITHUB_OUTPUT"
            else
              echo "${svc}=${REGISTRY}/kazi/${svc}:staging" >> "$GITHUB_OUTPUT"
            fi
          done

      - name: Deploy frontend
        uses: ./.github/actions/ecs-deploy
        with:
          cluster: ${{ env.ECS_CLUSTER }}
          service: kazi-staging-frontend
          task-definition-family: kazi-staging-frontend
          container-name: frontend
          image: ${{ steps.tags.outputs.frontend }}

      - name: Deploy backend
        uses: ./.github/actions/ecs-deploy
        with:
          cluster: ${{ env.ECS_CLUSTER }}
          service: kazi-staging-backend
          task-definition-family: kazi-staging-backend
          container-name: backend
          image: ${{ steps.tags.outputs.backend }}

      - name: Deploy gateway
        uses: ./.github/actions/ecs-deploy
        with:
          cluster: ${{ env.ECS_CLUSTER }}
          service: kazi-staging-gateway
          task-definition-family: kazi-staging-gateway
          container-name: gateway
          image: ${{ steps.tags.outputs.gateway }}

      - name: Deploy portal
        uses: ./.github/actions/ecs-deploy
        with:
          cluster: ${{ env.ECS_CLUSTER }}
          service: kazi-staging-portal
          task-definition-family: kazi-staging-portal
          container-name: portal
          image: ${{ steps.tags.outputs.portal }}

      - name: Deploy keycloak
        uses: ./.github/actions/ecs-deploy
        with:
          cluster: ${{ env.ECS_CLUSTER }}
          service: kazi-staging-keycloak
          task-definition-family: kazi-staging-keycloak
          container-name: keycloak
          image: ${{ steps.tags.outputs.keycloak }}

  # ---------------------------------------------------------------------------
  # Smoke tests — verify staging URLs respond after deployment
  # ---------------------------------------------------------------------------
  smoke-test:
    name: Smoke Test
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Check frontend (200 OK)
        run: |
          echo "Checking frontend at https://staging-app.heykazi.com/ ..."
          curl -sf --retry 5 --retry-delay 15 --max-time 30 "https://staging-app.heykazi.com/" > /dev/null
          echo "Frontend is healthy."

      - name: Check gateway (expect 401 — gateway is working)
        run: |
          echo "Checking gateway at https://staging-app.heykazi.com/bff/me ..."
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --retry 5 --retry-delay 15 --max-time 30 "https://staging-app.heykazi.com/bff/me")
          if [ "$HTTP_CODE" = "401" ] || [ "$HTTP_CODE" = "200" ]; then
            echo "Gateway is healthy (HTTP ${HTTP_CODE})."
          else
            echo "::error::Gateway returned unexpected HTTP ${HTTP_CODE}"
            exit 1
          fi

      - name: Check keycloak health
        run: |
          echo "Checking keycloak at https://staging-auth.heykazi.com/health/ready ..."
          curl -sf --retry 5 --retry-delay 15 --max-time 30 "https://staging-auth.heykazi.com/health/ready" > /dev/null
          echo "Keycloak is healthy."

      - name: Check portal (200 OK)
        run: |
          echo "Checking portal at https://staging-portal.heykazi.com/ ..."
          curl -sf --retry 5 --retry-delay 15 --max-time 30 "https://staging-portal.heykazi.com/" > /dev/null
          echo "Portal is healthy."

      - name: Post smoke test results to summary
        if: always()
        run: |
          echo "## Staging Smoke Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Service | URL | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---------|-----|--------|" >> "$GITHUB_STEP_SUMMARY"

          for url in \
            "https://staging-app.heykazi.com/" \
            "https://staging-app.heykazi.com/bff/me" \
            "https://staging-auth.heykazi.com/health/ready" \
            "https://staging-portal.heykazi.com/"; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$url" 2>/dev/null || echo "ERR")
            if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "401" ]; then
              echo "| ${url} | ${url} | :white_check_mark: ${HTTP_CODE} |" >> "$GITHUB_STEP_SUMMARY"
            else
              echo "| ${url} | ${url} | :x: ${HTTP_CODE} |" >> "$GITHUB_STEP_SUMMARY"
            fi
          done
