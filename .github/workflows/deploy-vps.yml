name: deploy-vps
# Builds and pushes the stack images to GHCR. It does NOT deploy to the box:
# inbound CI SSH to the VPS is dropped at the provider edge and is fragile, so
# the box pulls for itself. After this run finishes, deploy on the box with:
#   ssh USER@HOST 'bash /opt/kazi/compose/scripts/deploy.sh'
on:
  workflow_dispatch:
    inputs:
      tag:
        description: Image tag
        default: dev

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  OWNER: ${{ github.repository_owner }}
  TAG: ${{ inputs.tag || 'dev' }}

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ghcr.io/${{ env.OWNER }}/kazi-backend:${{ env.TAG }}

      - name: Build & push gateway
        uses: docker/build-push-action@v6
        with:
          context: ./gateway
          file: ./gateway/Dockerfile
          push: true
          tags: ghcr.io/${{ env.OWNER }}/kazi-gateway:${{ env.TAG }}

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./frontend/Dockerfile
          push: true
          build-args: |
            NEXT_PUBLIC_AUTH_MODE=keycloak
            NEXT_PUBLIC_GATEWAY_URL=https://bff-dev.heykazi.com
            NEXT_PUBLIC_BACKEND_URL=https://api-dev.heykazi.com
            NEXT_PUBLIC_KEYCLOAK_URL=https://auth-dev.heykazi.com
            NEXT_PUBLIC_KEYCLOAK_REALM=docteams
            NEXT_PUBLIC_KEYCLOAK_CLIENT_ID=gateway-bff
            NEXT_PUBLIC_APP_URL=https://app-dev.heykazi.com
          tags: ghcr.io/${{ env.OWNER }}/kazi-frontend:${{ env.TAG }}

      - name: Build & push portal
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./portal/Dockerfile
          push: true
          build-args: |
            NEXT_PUBLIC_PORTAL_API_URL=https://api-dev.heykazi.com
          tags: ghcr.io/${{ env.OWNER }}/kazi-portal:${{ env.TAG }}

      - name: Build & push docs
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docs/Dockerfile
          push: true
          tags: ghcr.io/${{ env.OWNER }}/kazi-docs:${{ env.TAG }}

      - name: Deploy reminder
        run: |
          echo "Images pushed to ghcr.io/${OWNER}/kazi-*:${TAG}."
          echo "Deploy on the box: ssh USER@HOST 'bash /opt/kazi/compose/scripts/deploy.sh'"
