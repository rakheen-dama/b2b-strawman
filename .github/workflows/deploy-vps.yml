name: deploy-vps
on:
  workflow_dispatch:
    inputs:
      tag:
        description: Image tag
        default: dev

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  OWNER: ${{ github.repository_owner }}
  TAG: ${{ inputs.tag || 'dev' }}

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ghcr.io/${{ env.OWNER }}/kazi-backend:${{ env.TAG }}

      - name: Build & push gateway
        uses: docker/build-push-action@v6
        with:
          context: ./gateway
          file: ./gateway/Dockerfile
          push: true
          tags: ghcr.io/${{ env.OWNER }}/kazi-gateway:${{ env.TAG }}

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./frontend/Dockerfile
          push: true
          build-args: |
            NEXT_PUBLIC_AUTH_MODE=keycloak
            NEXT_PUBLIC_GATEWAY_URL=https://bff-dev.heykazi.com
            NEXT_PUBLIC_BACKEND_URL=https://api-dev.heykazi.com
            NEXT_PUBLIC_KEYCLOAK_URL=https://auth-dev.heykazi.com
            NEXT_PUBLIC_KEYCLOAK_REALM=docteams
            NEXT_PUBLIC_KEYCLOAK_CLIENT_ID=gateway-bff
            NEXT_PUBLIC_APP_URL=https://app-dev.heykazi.com
          tags: ghcr.io/${{ env.OWNER }}/kazi-frontend:${{ env.TAG }}

      - name: Build & push portal
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./portal/Dockerfile
          push: true
          build-args: |
            NEXT_PUBLIC_PORTAL_API_URL=https://api-dev.heykazi.com
          tags: ghcr.io/${{ env.OWNER }}/kazi-portal:${{ env.TAG }}

  deploy:
    needs: build-push
    runs-on: ubuntu-latest
    steps:
      - name: SSH pull & up
        uses: appleboy/ssh-action@7eaf76671a0d7eec5d98ee897acda4f968735a17 # v1.2.0
        with:
          host: ${{ secrets.VPS_SSH_HOST }}
          username: ${{ secrets.VPS_SSH_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/kazi/compose
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose --env-file .env.prod -f docker-compose.prod.yml pull
            docker compose --env-file .env.prod -f docker-compose.prod.yml up -d
            docker image prune -f
