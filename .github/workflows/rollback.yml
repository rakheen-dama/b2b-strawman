  # ---------------------------------------------------------------------------
  # Smoke tests after rollback
  # ---------------------------------------------------------------------------
  smoke-test:
    name: Smoke Test
    needs: [rollback-frontend, rollback-backend, rollback-gateway, rollback-portal, rollback-keycloak]
    if: always() && !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled') && contains(needs.*.result, 'success')
    runs-on: ubuntu-latest
    env:
      ENV: ${{ inputs.environment }}
    steps:
      - name: Resolve URLs
        id: urls
        env:
          ENV: ${{ inputs.environment }}
        run: |
          if [ "$ENV" = "production" ]; then
            echo "frontend=https://app.heykazi.com/" >> "$GITHUB_OUTPUT"
            echo "gateway=https://app.heykazi.com/bff/me" >> "$GITHUB_OUTPUT"
            echo "keycloak=https://auth.heykazi.com/health/ready" >> "$GITHUB_OUTPUT"
            echo "portal=https://portal.heykazi.com/" >> "$GITHUB_OUTPUT"
          else
            echo "frontend=https://staging-app.heykazi.com/" >> "$GITHUB_OUTPUT"
            echo "gateway=https://staging-app.heykazi.com/bff/me" >> "$GITHUB_OUTPUT"
            echo "keycloak=https://staging-auth.heykazi.com/health/ready" >> "$GITHUB_OUTPUT"
            echo "portal=https://staging-portal.heykazi.com/" >> "$GITHUB_OUTPUT"
          fi

      - name: Check frontend (200 OK)
        env:
          URL: ${{ steps.urls.outputs.frontend }}
        run: |
          echo "Checking frontend at ${URL} ..."
          curl -sf --retry 5 --retry-delay 15 --max-time 30 "$URL" > /dev/null
          echo "Frontend is healthy."

      - name: Check gateway (expect 401 — gateway is working)
        env:
          URL: ${{ steps.urls.outputs.gateway }}
        run: |
          echo "Checking gateway at ${URL} ..."
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --retry 5 --retry-delay 15 --max-time 30 "$URL")
          if [ "$HTTP_CODE" = "401" ] || [ "$HTTP_CODE" = "200" ]; then
            echo "Gateway is healthy (HTTP ${HTTP_CODE})."
          else
            echo "::error::Gateway returned unexpected HTTP ${HTTP_CODE}"
            exit 1
          fi

      - name: Check keycloak health
        env:
          URL: ${{ steps.urls.outputs.keycloak }}
        run: |
          echo "Checking keycloak at ${URL} ..."
          curl -sf --retry 5 --retry-delay 15 --max-time 30 "$URL" > /dev/null
          echo "Keycloak is healthy."

      - name: Check portal (200 OK)
        env:
          URL: ${{ steps.urls.outputs.portal }}
        run: |
          echo "Checking portal at ${URL} ..."
          curl -sf --retry 5 --retry-delay 15 --max-time 30 "$URL" > /dev/null
          echo "Portal is healthy."

      - name: Post smoke test results to summary
        if: always()
        env:
          FRONTEND_URL: ${{ steps.urls.outputs.frontend }}
          GATEWAY_URL: ${{ steps.urls.outputs.gateway }}
          KEYCLOAK_URL: ${{ steps.urls.outputs.keycloak }}
          PORTAL_URL: ${{ steps.urls.outputs.portal }}
        run: |
          echo "## Rollback Smoke Test Results (${{ inputs.environment }})" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Service | URL | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---------|-----|--------|" >> "$GITHUB_STEP_SUMMARY"

          for url in "$FRONTEND_URL" "$GATEWAY_URL" "$KEYCLOAK_URL" "$PORTAL_URL"; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$url" 2>/dev/null || echo "ERR")
            if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "401" ]; then
              echo "| ${url} | ${url} | :white_check_mark: ${HTTP_CODE} |" >> "$GITHUB_STEP_SUMMARY"
            else
              echo "| ${url} | ${url} | :x: ${HTTP_CODE} |" >> "$GITHUB_STEP_SUMMARY"
            fi
          done
