# Keycloak profile configuration
# Activated via: SPRING_PROFILES_ACTIVE=keycloak
# Overrides Clerk JWT settings from application-local.yml when both profiles are active.

spring:
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${JWT_ISSUER_URI:http://localhost:8180/realms/docteams}
          jwk-set-uri: ${JWT_JWK_SET_URI:http://localhost:8180/realms/docteams/protocol/openid-connect/certs}

app:
  jit-provisioning:
    enabled: true
  keycloak:
    set-default-password: true

keycloak:
  admin:
    auth-server-url: ${KEYCLOAK_AUTH_SERVER_URL:http://localhost:8180}
    realm: ${KEYCLOAK_REALM:docteams}
    username: ${KEYCLOAK_ADMIN_USERNAME:admin}
    password: ${KEYCLOAK_ADMIN_PASSWORD:admin}

# Dev-only mock payment gateway: the checkout page is served by MockPaymentController
# on the backend (port 8080), NOT the Next.js frontend (port 3000). docteams.app.base-url
# points at the frontend, so we set an explicit backend host here for the mock checkout
# redirect URL. See GAP-L-66.
docteams:
  payment:
    mock:
      checkout-base-url: http://localhost:8080
