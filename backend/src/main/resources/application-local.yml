spring:
  mail:
    host: localhost
    port: 1025
    properties:
      mail.smtp.auth: false
      mail.smtp.starttls.enable: false

  datasource:
    app:
      jdbc-url: jdbc:postgresql://localhost:5432/docteams
      username: postgres
      password: postgres
      driver-class-name: org.postgresql.Driver
      maximum-pool-size: 5
      minimum-idle: 2
      connection-timeout: 10000
      validation-timeout: 5000
      idle-timeout: 300000
      max-lifetime: 1200000
      leak-detection-threshold: 30000
      connection-init-sql: SET search_path TO public
    migration:
      jdbc-url: jdbc:postgresql://localhost:5432/docteams
      username: postgres
      password: postgres
      driver-class-name: org.postgresql.Driver
      maximum-pool-size: 2
      connection-timeout: 30000
    portal:
      jdbc-url: jdbc:postgresql://localhost:5432/docteams
      username: postgres
      password: postgres
      driver-class-name: org.postgresql.Driver
      maximum-pool-size: 3
      minimum-idle: 1
      connection-timeout: 10000
      connection-init-sql: SET search_path TO portal, public

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: false

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://crucial-sturgeon-38.clerk.accounts.dev
          jwk-set-uri: https://crucial-sturgeon-38.clerk.accounts.dev/.well-known/jwks.json
  threads:
    virtual:
      enabled: true

# LocalStack S3
aws:
  s3:
    endpoint: http://localhost:4566
    region: us-east-1
    bucket-name: docteams-dev
  credentials:
    access-key-id: test
    secret-access-key: test

# Internal API security (webhook handler -> backend)
internal:
  api:
    key: local-dev-api-key-change-in-production

# Customer portal JWT signing secret (min 32 bytes for HMAC-SHA256)
portal:
  jwt:
    secret: local-dev-portal-secret-change-in-production-min32bytes
  magic-link:
    secret: local-magic-link-secret-must-be-at-least-32-bytes-long

# Integration encryption (Base64-encoded 256-bit key for AES-256-GCM)
integration:
  encryption-key: dGhpcy1pcy1hLTMyLWJ5dGUtbG9jYWwtZGV2LWtleSE=

# Dev-only mock payment gateway: the checkout page is served by MockPaymentController
# on the backend (port 8080), NOT the Next.js frontend (port 3000). docteams.app.base-url
# points at the frontend, so we set an explicit backend host here for the mock checkout
# redirect URL. See GAP-L-66.
docteams:
  payment:
    mock:
      checkout-base-url: http://localhost:8080

cors:
  allowed-origins:
    - http://localhost:3000
    - http://localhost:3001
    - http://localhost:3002

logging:
  level:
    org.hibernate.SQL: INFO
    org.hibernate.orm.jdbc.bind: INFO
    org.flywaydb: INFO

heykazi:
  billing:
    notify-url: http://localhost:8080/api/webhooks/subscription
    return-url: http://localhost:3000/settings/billing?result=success
    cancel-url: http://localhost:3000/settings/billing?result=cancelled
    payfast:
      merchant-id: ${PAYFAST_MERCHANT_ID:10000100}
      merchant-key: ${PAYFAST_MERCHANT_KEY:46f0cd694581a}
      passphrase: ${PAYFAST_PASSPHRASE:jt7NOE43FZPn}
      sandbox: true
