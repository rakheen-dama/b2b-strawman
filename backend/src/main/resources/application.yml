spring:
  application:
    name: backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  datasource:
    portal:
      jdbc-url: jdbc:postgresql://localhost:5432/app
      username: postgres
      password: changeme
      driver-class-name: org.postgresql.Driver
      maximum-pool-size: 5
      minimum-idle: 1
      connection-timeout: 10000
      connection-init-sql: SET search_path TO portal, public
  jpa:
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          batch_size: 25
          fetch_size: 50
        order_inserts: true
        query:
          in_clause_parameter_padding: true
          plan_cache_max_size: 2048
  mail:
    host: ${SMTP_HOST:}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 15MB
  jmx:
    enabled: false
  threads:
    virtual:
      enabled: true

server:
  compression:
    enabled: true
    mime-types: application/json,text/plain,application/javascript
    min-response-size: 1024

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized
  health:
    mail:
      enabled: false

logging:
  level:
    root: INFO
    io.b2mash.b2b.b2bstrawman: INFO
  structured:
    format:
      console: ecs

integration:
  encryption-key: ${INTEGRATION_ENCRYPTION_KEY:}

docteams:
  email:
    sender-address: ${EMAIL_SENDER_ADDRESS:noreply@kazi.app}
    unsubscribe-secret: ${EMAIL_UNSUBSCRIBE_SECRET:}
    rate-limit:
      smtp: 50
      byoak: 200
      platform-aggregate: 2000
    sendgrid:
      webhook-verification-key: ${SENDGRID_WEBHOOK_VERIFICATION_KEY:}
  app:
    base-url: ${APP_BASE_URL:http://localhost:3000}
    portal-base-url: ${PORTAL_BASE_URL:http://localhost:3002}
    product-name: ${PRODUCT_NAME:Kazi}
  stripe:
    webhook-url: ${STRIPE_WEBHOOK_URL:}
  payfast:
    sandbox: true

audit:
  retention:
    domain-events-days: 1095
    security-events-days: 365
    purge-enabled: false

app:
  jit-provisioning:
    enabled: false
  access-request:
    blocked-email-domains:
      - gmail.com
      - yahoo.com
      - hotmail.com
      - outlook.com
      - aol.com
      - icloud.com
      - mail.com
      - protonmail.com
      - zoho.com
    otp-expiry-minutes: 10
    otp-max-attempts: 5

# keycloak.admin.* properties are defined in application-keycloak.yml
# The KeycloakProvisioningClient bean is only created when that profile is active.

kazi:
  sharding:
    enabled: false
    control-plane-datasource: primary
  job-queue:
    enabled: true
    batch-size: 20
    poll-interval-ms: 2000
    stale-claim-timeout-minutes: 15
    max-retries-default: 3
    backoff-base-seconds: 10
  ai:
    anthropic:
      api-base-url: ${ANTHROPIC_API_BASE_URL:https://api.anthropic.com}
      api-version: "2023-06-01"
      timeout-seconds: 120
      max-retries: 3
    pricing:
      claude-sonnet-4-6:
        input-per-m-token: 3.00
        output-per-m-token: 15.00
        cache-read-per-m-token: 0.30
        cache-creation-per-m-token: 3.75
      claude-opus-4-6:
        input-per-m-token: 15.00
        output-per-m-token: 75.00
        cache-read-per-m-token: 1.50
        cache-creation-per-m-token: 18.75
    exchange-rate:
      usd-to-zar: 18.50
    timeout-seconds: 120
    max-document-size-bytes: 10485760
    max-total-document-size-bytes: 52428800

heykazi:
  billing:
    monthly-price-cents: 49900
    trial-days: 14
    grace-period-days: 60
    currency: ZAR
    item-name: "HeyKazi Professional"
    max-members: 10
    notify-url: ${HEYKAZI_BASE_URL}/api/webhooks/subscription
    return-url: ${HEYKAZI_FRONTEND_URL}/settings/billing?result=success
    cancel-url: ${HEYKAZI_FRONTEND_URL}/settings/billing?result=cancelled
    payfast:
      merchant-id: ${PAYFAST_MERCHANT_ID}
      merchant-key: ${PAYFAST_MERCHANT_KEY}
      passphrase: ${PAYFAST_PASSPHRASE}
      sandbox: ${PAYFAST_SANDBOX:true}
