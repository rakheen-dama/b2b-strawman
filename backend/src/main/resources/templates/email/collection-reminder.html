<div xmlns:th="http://www.thymeleaf.org">
  <h2 style="margin: 0 0 16px 0; font-size: 20px; font-weight: 600; color: #111827;">Payment reminder from <span th:text="${orgName != null ? orgName : 'Kazi'}">Kazi</span></h2>
  <p style="margin: 0 0 16px 0; font-size: 14px; line-height: 1.6; color: #374151;">
    Hi <span th:text="${customerName != null ? customerName : 'there'}">there</span>,
  </p>
  <!-- AI-drafted letter paragraphs (approved on the gate) — clearly bounded block. The AI owns
       ONLY these paragraphs + the subject; all facts below are template-rendered (ADR-327). -->
  <div style="margin: 0 0 16px 0; font-size: 14px; line-height: 1.6; color: #374151;" th:utext="${reminderBodyHtml}">
    <p>Our records show an invoice on your account remains unpaid.</p>
  </div>
  <!-- Frame-owned invoice facts table -->
  <table role="presentation" cellpadding="0" cellspacing="0" width="100%" style="margin: 0 0 16px 0;">
    <tr>
      <td style="padding: 16px; background-color: #f9fafb; border-radius: 6px;">
        <table role="presentation" cellpadding="0" cellspacing="0" width="100%">
          <tr>
            <td style="padding: 4px 0; width: 50%;">
              <span style="font-size: 12px; color: #6b7280; text-transform: uppercase; letter-spacing: 0.05em;" th:text="|${invoiceTerm} Number|">Invoice Number</span><br/>
              <span style="font-size: 14px; color: #111827; font-weight: 500;" th:text="${invoiceNumber != null ? invoiceNumber : 'N/A'}">N/A</span>
            </td>
            <td style="padding: 4px 0; width: 50%;">
              <span style="font-size: 12px; color: #6b7280; text-transform: uppercase; letter-spacing: 0.05em;">Due Date</span><br/>
              <span style="font-size: 14px; color: #111827; font-weight: 500;" th:text="${dueDate != null ? dueDate : 'N/A'}">N/A</span>
            </td>
          </tr>
          <tr>
            <td style="padding: 8px 0 4px 0; width: 50%;">
              <span style="font-size: 12px; color: #6b7280; text-transform: uppercase; letter-spacing: 0.05em;">Amount Due</span><br/>
              <span style="font-size: 20px; color: #111827; font-weight: 600;">
                <span th:text="${currency != null ? currency : ''}"></span>
                <span th:text="${amount != null ? amount : 'N/A'}">N/A</span>
              </span>
            </td>
            <td style="padding: 8px 0 4px 0; width: 50%;">
              <span style="font-size: 12px; color: #6b7280; text-transform: uppercase; letter-spacing: 0.05em;">Days Overdue</span><br/>
              <span style="font-size: 14px; color: #111827; font-weight: 500;" th:text="${daysOverdue != null ? daysOverdue : 'N/A'}">N/A</span>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
  <!-- Pay Now button (only shown if paymentUrl is non-null) -->
  <div th:if="${paymentUrl}" style="text-align: center; margin: 24px 0 8px 0;">
    <table role="presentation" cellpadding="0" cellspacing="0" style="margin: 0 auto;">
      <tr>
        <td align="center" style="border-radius: 6px; background-color: #2563EB;" th:style="'border-radius: 6px; background-color: ' + (${brandColor != null ? brandColor : '#2563EB'}) + ';'">
          <a th:href="${paymentUrl}" style="display: inline-block; padding: 14px 32px; color: #ffffff; text-decoration: none; font-size: 16px; font-weight: 600; border-radius: 6px; background-color: #2563EB;" th:style="'display: inline-block; padding: 14px 32px; color: #ffffff; text-decoration: none; font-size: 16px; font-weight: 600; border-radius: 6px; background-color: ' + (${brandColor != null ? brandColor : '#2563EB'}) + ';'">
            Pay Now
          </a>
        </td>
      </tr>
    </table>
  </div>
  <!-- portalUrl fallback CTA — always populated (GAP-L-64 precedent) -->
  <table role="presentation" cellpadding="0" cellspacing="0" style="margin: 24px 0;">
    <tr>
      <td align="center" style="border-radius: 6px;" th:style="'border-radius: 6px; background-color: ' + (${brandColor != null ? brandColor : '#2563EB'}) + ';'">
        <a th:href="${portalUrl}" style="display: inline-block; padding: 12px 24px; color: #ffffff; text-decoration: none; font-size: 14px; font-weight: 600; border-radius: 6px;" th:style="'display: inline-block; padding: 12px 24px; color: #ffffff; text-decoration: none; font-size: 14px; font-weight: 600; border-radius: 6px; background-color: ' + (${brandColor != null ? brandColor : '#2563EB'}) + ';'" th:text="|View ${invoiceTerm}|">
          View Invoice
        </a>
      </td>
    </tr>
  </table>
  <p style="margin: 0; font-size: 14px; line-height: 1.6; color: #374151;">
    Best,<br/>
    <span th:text="${orgName != null ? orgName : 'Kazi'}">Kazi</span>
  </p>
</div>
