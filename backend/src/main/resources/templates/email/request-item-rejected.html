<div xmlns:th="http://www.thymeleaf.org">
  <h2 style="margin: 0 0 16px 0; font-size: 20px; font-weight: 600; color: #111827;">Item Requires Re-submission</h2>
  <p style="margin: 0 0 16px 0; font-size: 14px; line-height: 1.6; color: #374151;">
    Hi <span th:text="${contactName != null ? contactName : 'there'}">there</span>,
  </p>
  <p style="margin: 0 0 16px 0; font-size: 14px; line-height: 1.6; color: #374151;">
    <span th:text="${orgName != null ? orgName : 'DocTeams'}">DocTeams</span> has requested changes to your submission for
    "<strong th:text="${itemName}">Item</strong>" on request
    <strong th:text="${requestNumber}">REQ-0001</strong>.
  </p>
  <table role="presentation" cellpadding="0" cellspacing="0" width="100%" style="margin: 16px 0;">
    <tr>
      <td style="padding: 16px; background-color: #fef2f2; border: 1px solid #fecaca; border-radius: 6px;">
        <p style="margin: 0 0 4px 0; font-size: 12px; font-weight: 600; color: #991b1b; text-transform: uppercase;">Reason</p>
        <p style="margin: 0; font-size: 14px; color: #991b1b;" th:text="${rejectionReason}">Reason for rejection</p>
      </td>
    </tr>
  </table>
  <p style="margin: 0 0 24px 0; font-size: 14px; line-height: 1.6; color: #374151;">
    Please review the feedback and re-submit the item.
  </p>
  <table role="presentation" cellpadding="0" cellspacing="0" style="margin: 0 0 24px 0;">
    <tr>
      <td align="center" style="border-radius: 6px;" th:style="'border-radius: 6px; background-color: ' + (${brandColor != null ? brandColor : '#2563EB'}) + ';'">
        <a th:href="${portalUrl}" style="display: inline-block; padding: 12px 24px; color: #ffffff; text-decoration: none; font-size: 14px; font-weight: 600; border-radius: 6px;" th:style="'display: inline-block; padding: 12px 24px; color: #ffffff; text-decoration: none; font-size: 14px; font-weight: 600; border-radius: 6px; background-color: ' + (${brandColor != null ? brandColor : '#2563EB'}) + ';'">
          View Request
        </a>
      </td>
    </tr>
  </table>
  <p style="margin: 0; font-size: 14px; line-height: 1.6; color: #374151;">
    Best,<br/>
    <span th:text="${orgName != null ? orgName : 'DocTeams'}">DocTeams</span>
  </p>
</div>
