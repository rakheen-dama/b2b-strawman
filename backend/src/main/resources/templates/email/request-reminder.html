<div xmlns:th="http://www.thymeleaf.org">
  <h2 style="margin: 0 0 16px 0; font-size: 20px; font-weight: 600; color: #111827;">Reminder: Outstanding Items</h2>
  <p style="margin: 0 0 16px 0; font-size: 14px; line-height: 1.6; color: #374151;">
    Hi <span th:text="${contactName != null ? contactName : 'there'}">there</span>,
  </p>
  <p style="margin: 0 0 16px 0; font-size: 14px; line-height: 1.6; color: #374151;">
    This is a reminder that you have <strong th:text="${outstandingCount}">0</strong> outstanding item(s)
    for information request <strong th:text="${requestNumber}">REQ-0001</strong>
    from <span th:text="${orgName != null ? orgName : 'Kazi'}">Kazi</span>.
  </p>
  <table role="presentation" cellpadding="0" cellspacing="0" style="margin: 0 0 16px 0; width: 100%; border-collapse: collapse;" th:if="${items != null and !items.isEmpty()}">
    <tr>
      <td style="padding: 8px 12px; font-size: 13px; font-weight: 600; color: #6B7280; border-bottom: 1px solid #E5E7EB;">Item</td>
      <td style="padding: 8px 12px; font-size: 13px; font-weight: 600; color: #6B7280; border-bottom: 1px solid #E5E7EB;">Status</td>
    </tr>
    <tr th:each="item : ${items}">
      <td style="padding: 8px 12px; font-size: 14px; color: #374151; border-bottom: 1px solid #F3F4F6;" th:text="${item.name}">Item Name</td>
      <td style="padding: 8px 12px; font-size: 14px; color: #374151; border-bottom: 1px solid #F3F4F6;" th:text="${item.status}">PENDING</td>
    </tr>
  </table>
  <p style="margin: 0 0 24px 0; font-size: 14px; line-height: 1.6; color: #374151;">
    Please review and respond to the outstanding items by clicking the button below.
  </p>
  <table role="presentation" cellpadding="0" cellspacing="0" style="margin: 0 0 24px 0;">
    <tr>
      <td align="center" style="border-radius: 6px;" th:style="'border-radius: 6px; background-color: ' + (${brandColor != null ? brandColor : '#2563EB'}) + ';'">
        <a th:href="${portalUrl}" style="display: inline-block; padding: 12px 24px; color: #ffffff; text-decoration: none; font-size: 14px; font-weight: 600; border-radius: 6px;" th:style="'display: inline-block; padding: 12px 24px; color: #ffffff; text-decoration: none; font-size: 14px; font-weight: 600; border-radius: 6px; background-color: ' + (${brandColor != null ? brandColor : '#2563EB'}) + ';'">
          View Request
        </a>
      </td>
    </tr>
  </table>
  <p style="margin: 0; font-size: 14px; line-height: 1.6; color: #374151;">
    Best,<br/>
    <span th:text="${orgName != null ? orgName : 'Kazi'}">Kazi</span>
  </p>
</div>
