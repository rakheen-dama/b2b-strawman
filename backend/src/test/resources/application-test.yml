logging:
  level:
    root: ERROR
    io.b2mash.b2b.b2bstrawman: ERROR
    org.springframework: ERROR

spring:
  main:
    # Required: AiSpecialistInvocation*IntegrationTest @TestConfiguration classes override
    # the billingPolishApplier bean by name. Without this flag, Spring refuses the override.
    allow-bean-definition-overriding: true
  ai:
    mcp:
      server:
        enabled: true
        protocol: STREAMABLE
        name: kazi
        version: 1.0.0
        type: SYNC
        instructions: >-
          Kazi is this firm's practice-management system of record. All tools are
          READ-ONLY; use them to ground your answers in live matter, client, time,
          trust, compliance, document and invoice data.
        capabilities:
          tool: true
          resource: true
          prompt: false
          completion: false
        streamable-http:
          mcp-endpoint: /mcp
  datasource:
    app:
      maximum-pool-size: 3
      connection-timeout: 60000
    migration:
      maximum-pool-size: 2
      connection-timeout: 60000
    portal:
      maximum-pool-size: 2
      connection-timeout: 60000
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://test-issuer.example.com

  jpa:
    open-in-view: false

  flyway:
    enabled: false

  # Mail config — points at the JVM-wide GreenMail singleton (GreenMailTestSupport).
  # The port is DYNAMIC: GreenMailLauncherSessionListener forces the singleton's
  # static init at JUnit launcher-session start, which scans 13025-13125 for a free
  # port, binds GreenMail there, and sets the greenmail.smtp.port system property —
  # all before any Spring test context resolves spring.mail.port. The :13025 fallback
  # only applies under exotic non-JUnit-Platform runners. Keeping the placeholder here
  # (instead of per-class @DynamicPropertySource) preserves a single Spring context
  # cache key across all email tests (config SOURCES are hashed, not resolved values).
  mail:
    host: localhost
    port: ${greenmail.smtp.port:13025}
    username: ""
    password: ""
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

internal:
  api:
    key: test-api-key

portal:
  jwt:
    secret: test-portal-secret-must-be-at-least-32-bytes-long
  magic-link:
    secret: test-magic-link-secret-must-be-at-least-32-bytes-long

aws:
  s3:
    endpoint: http://localhost:4566
    region: us-east-1
    bucket-name: test-bucket
  credentials:
    access-key-id: test
    secret-access-key: test

# Integration encryption (Base64-encoded 256-bit key for AES-256-GCM)
integration:
  encryption-key: dGVzdC1lbmNyeXB0aW9uLWtleS1tdXN0LWJlLTMyYiE=

docteams:
  email:
    unsubscribe-secret: test-unsubscribe-secret-for-integration-tests
    sender-address: test@kazi.app

# Keycloak admin config — KC client is mocked via @MockitoBean in tests
# Not setting keycloak.admin.auth-server-url to prevent ConditionalOnProperty from creating the bean

# Webhook verification key intentionally NOT set here — fail-closed by default.
# Tests that need webhook access use @DynamicPropertySource to inject a test ECDSA key.

kazi:
  # Disable Spring scheduling in tests — @SpringBootTest contexts boot the full app, so without
  # this every @Scheduled method (drain workers, pollers) would fire during the suite. Gated by
  # SchedulingConfig (matchIfMissing=true, so prod/dev/local stay on). A test class that needs a
  # scheduler can opt back in via @TestPropertySource(properties = "kazi.scheduling.enabled=true").
  scheduling:
    enabled: false
  sharding:
    enabled: false
  job-queue:
    enabled: false
    poll-interval-ms: 100
    dual-mode:
      recurring_schedule_execute: true
      dormancy_check: true
      proposal_expiry: true
      acceptance_expiry: true
      magic_link_cleanup: true
      ai_gate_expiry: true
      field_date_scan: true
      request_reminder_check: true
      subscription_trial_expiry: true
      subscription_grace_expiry: true
      subscription_cancellation_end: true
      court_date_reminder: true
      ai_invocation_expiry: true
      portal_digest: true
  xero:
    client-id: test-xero-client-id
    client-secret: test-xero-client-secret
    redirect-uri: http://localhost:3000/api/integrations/xero/callback
    authorize-url: https://login.xero.com/identity/connect/authorize
    token-url: https://identity.xero.com/connect/token
    connections-url: https://api.xero.com/connections
    api-base-url: https://api.xero.com/api.xro/2.0
    revocation-url: https://identity.xero.com/connect/revocation
  ai:
    anthropic:
      api-base-url: http://localhost:0
      api-version: "2023-06-01"
      timeout-seconds: 10
      max-retries: 2
    pricing:
      claude-sonnet-4-6:
        input-per-m-token: 3.00
        output-per-m-token: 15.00
        cache-read-per-m-token: 0.30
        cache-creation-per-m-token: 3.75
      claude-opus-4-6:
        input-per-m-token: 15.00
        output-per-m-token: 75.00
        cache-read-per-m-token: 1.50
        cache-creation-per-m-token: 18.75
    exchange-rate:
      usd-to-zar: 18.50
    timeout-seconds: 10
    max-document-size-bytes: 10485760
    max-total-document-size-bytes: 52428800

heykazi:
  billing:
    notify-url: http://localhost:8080/api/webhooks/subscription
    return-url: http://localhost:3000/settings/billing?result=success
    cancel-url: http://localhost:3000/settings/billing?result=cancelled
    payfast:
      merchant-id: test-merchant-id
      merchant-key: test-merchant-key
      passphrase: test-passphrase
      sandbox: true

