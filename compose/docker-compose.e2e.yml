# Ephemeral E2E-only stack — credentials below are throwaway defaults
# used only in local/CI containers. No real secrets here.
name: docteams-e2e

services:
  postgres:
    image: postgres:16-alpine
    container_name: e2e-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: changeme
      POSTGRES_DB: app
    ports:
      - "5433:5432"
    volumes:
      - e2e_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d app"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - e2e-network

  localstack:
    image: localstack/localstack:3
    container_name: e2e-localstack
    environment:
      SERVICES: s3
      AWS_DEFAULT_REGION: us-east-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      S3_BUCKET_NAME: docteams-dev
    ports:
      - "4567:4566"
    volumes:
      - e2e_localstack_data:/var/lib/localstack
      - ./data/s3:/etc/localstack/init/ready.d
    healthcheck:
      test: ["CMD-SHELL", "awslocal s3 ls"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - e2e-network

  mailpit:
    image: axllent/mailpit:latest
    container_name: e2e-mailpit
    ports:
      - "1026:1025"    # SMTP (1025 taken by dev stack)
      - "8026:8025"    # Web UI (8025 taken by dev stack)
    networks:
      - e2e-network

  keycloak:
    image: quay.io/keycloak/keycloak:26.1
    container_name: e2e-keycloak
    command: start-dev --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/app?currentSchema=keycloak
      KC_DB_USERNAME: postgres
      KC_DB_PASSWORD: changeme
      KC_FEATURES: organization
      KC_HEALTH_ENABLED: "true"
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "9091:8080"
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
      - ../keycloak-spi/target/keycloak-spi-0.0.1-SNAPSHOT.jar:/opt/keycloak/providers/keycloak-spi.jar:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/health/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s
    networks:
      - e2e-network

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: e2e-backend
    environment:
      SPRING_PROFILES_ACTIVE: e2e,keycloak
      SPRING_DATASOURCE_APP_JDBC_URL: jdbc:postgresql://postgres:5432/app
      SPRING_DATASOURCE_APP_USERNAME: postgres
      SPRING_DATASOURCE_APP_PASSWORD: changeme
      SPRING_DATASOURCE_MIGRATION_JDBC_URL: jdbc:postgresql://postgres:5432/app
      SPRING_DATASOURCE_MIGRATION_USERNAME: postgres
      SPRING_DATASOURCE_MIGRATION_PASSWORD: changeme
      SPRING_DATASOURCE_PORTAL_JDBC_URL: jdbc:postgresql://postgres:5432/app
      SPRING_DATASOURCE_PORTAL_USERNAME: postgres
      SPRING_DATASOURCE_PORTAL_PASSWORD: changeme
      AWS_S3_ENDPOINT: http://localstack:4566
      AWS_S3_PRESIGNER_ENDPOINT: http://localhost:4567
      AWS_S3_REGION: us-east-1
      AWS_S3_BUCKET_NAME: docteams-dev
      AWS_CREDENTIALS_ACCESS_KEY_ID: test
      AWS_CREDENTIALS_SECRET_ACCESS_KEY: test
      SPRING_MAIL_HOST: mailpit
      SPRING_MAIL_PORT: 1025
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_ADMIN_CLIENT_SECRET: docteams-admin-secret
    ports:
      - "8081:8080"
    depends_on:
      postgres:
        condition: service_healthy
      localstack:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s
    networks:
      - e2e-network

  gateway:
    build:
      context: ../gateway
      dockerfile: Dockerfile
    container_name: e2e-gateway
    environment:
      SPRING_PROFILES_ACTIVE: keycloak,e2e
      BACKEND_URL: http://backend:8080
      KEYCLOAK_URL: http://keycloak:8080
      CORS_ALLOWED_ORIGINS: http://localhost:3001,http://localhost:3002
    ports:
      - "8091:8090"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8090/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - e2e-network

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_AUTH_MODE: keycloak
    container_name: e2e-frontend
    environment:
      BACKEND_URL: http://backend:8080
      INTERNAL_BACKEND_URL: http://backend:8080
      INTERNAL_API_KEY: e2e-test-api-key
      KEYCLOAK_CLIENT_ID: docteams-web
      KEYCLOAK_CLIENT_SECRET: docteams-web-secret
      KEYCLOAK_ISSUER: http://keycloak:8080/realms/docteams
      KEYCLOAK_DEFAULT_ORG: e2e-test-org
      NEXTAUTH_URL: http://localhost:3001
      NEXTAUTH_SECRET: e2e-nextauth-secret-at-least-32-chars
      AUTH_TRUST_HOST: "true"
    ports:
      - "3001:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s
    depends_on:
      backend:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    networks:
      - e2e-network

  seed:
    build:
      context: ./seed
      dockerfile: Dockerfile
    container_name: e2e-seed
    environment:
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_ADMIN_CLIENT_SECRET: docteams-admin-secret
    restart: "no"
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    networks:
      - e2e-network

volumes:
  e2e_postgres_data:
  e2e_localstack_data:

networks:
  e2e-network:
    driver: bridge
