name: docteams-dev

services:
  postgres:
    image: postgres:16-alpine
    container_name: b2b-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./data/postgres:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - dev-network

  mailpit:
    image: axllent/mailpit:latest
    container_name: b2b-mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"    # SMTP
      - "8025:8025"    # Web UI
    networks:
      - dev-network

  localstack:
    image: localstack/localstack:latest
    container_name: b2b-localstack
    restart: unless-stopped
    environment:
      SERVICES: s3
      AWS_DEFAULT_REGION: us-east-1
      AWS_ACCESS_KEY_ID: ${LS_AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${LS_AWS_SECRET_ACCESS_KEY}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME}
    ports:
      - "4566:4566"
    volumes:
      - localstack_data:/var/lib/localstack
      - ./data/s3:/etc/localstack/init/ready.d
    healthcheck:
      test: ["CMD-SHELL", "awslocal s3 ls"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - dev-network

  keycloak:
    build:
      context: ..
      dockerfile: compose/keycloak/Dockerfile
    container_name: b2b-keycloak
    command: start-dev --import-realm
    restart: unless-stopped
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}?currentSchema=keycloak
      KC_DB_USERNAME: ${POSTGRES_USER}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD}
      KC_FEATURES: organization
      KC_HEALTH_ENABLED: "true"
      # Pin the issuer URL so all tokens use the browser-reachable URL,
      # regardless of whether the request comes from Docker network or browser.
      KC_HOSTNAME: http://localhost:9090
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
    ports:
      - "9090:8080"
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/9000 && echo ready"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s
    networks:
      - dev-network
    profiles:
      - keycloak

  keycloak-init:
    build:
      context: ..
      dockerfile: compose/keycloak/Dockerfile
    container_name: b2b-keycloak-init
    entrypoint: /init/disable-ssl.sh
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
    volumes:
      - ./keycloak/disable-ssl.sh:/init/disable-ssl.sh:ro
    depends_on:
      keycloak:
        condition: service_healthy
    restart: "no"
    networks:
      - dev-network
    profiles:
      - keycloak

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: b2b-backend
    restart: unless-stopped
    environment:
      # When AUTH_MODE=keycloak, activate the keycloak Spring profile
      SPRING_PROFILES_ACTIVE: ${BACKEND_PROFILES:-local}
      # Datasource overrides (Docker service names instead of localhost)
      SPRING_DATASOURCE_APP_JDBC_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_APP_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_APP_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_DATASOURCE_MIGRATION_JDBC_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_MIGRATION_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_MIGRATION_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_DATASOURCE_PORTAL_JDBC_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_PORTAL_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PORTAL_PASSWORD: ${POSTGRES_PASSWORD}
      # Mail (Mailpit inside Docker network)
      SPRING_MAIL_HOST: mailpit
      SPRING_MAIL_PORT: 1025
      # S3 (LocalStack inside Docker network)
      AWS_S3_ENDPOINT: http://localstack:4566
      AWS_S3_PRESIGNER_ENDPOINT: http://localhost:4566
      AWS_S3_REGION: us-east-1
      AWS_S3_BUCKET_NAME: ${S3_BUCKET_NAME}
      AWS_CREDENTIALS_ACCESS_KEY_ID: ${LS_AWS_ACCESS_KEY_ID}
      AWS_CREDENTIALS_SECRET_ACCESS_KEY: ${LS_AWS_SECRET_ACCESS_KEY}
      # CORS disabled — gateway handles it; backend trusts internal traffic
      CORS_DISABLED: "true"
      # Security — JWT config handled by Spring profiles (application-local.yml for Clerk,
      # application-keycloak.yml for Keycloak). Do NOT set SPRING_SECURITY_OAUTH2_* env vars
      # here — they override profile-specific YAML and break multi-auth-mode support.
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      PORTAL_JWT_SECRET: ${PORTAL_JWT_SECRET}
      PORTAL_MAGIC_LINK_SECRET: ${PORTAL_MAGIC_LINK_SECRET}
      INTEGRATION_ENCRYPTION_KEY: ${INTEGRATION_ENCRYPTION_KEY}
      # Keycloak (only used when keycloak profile is active)
      KEYCLOAK_URL: http://keycloak:8080
      # JWT issuer must match the `iss` claim — pinned via KC_HOSTNAME to external URL
      KEYCLOAK_ISSUER_URI: http://localhost:9090/realms/docteams
      KEYCLOAK_ADMIN_CLIENT_SECRET: ${KEYCLOAK_ADMIN_CLIENT_SECRET:-docteams-admin-secret}

    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      localstack:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - dev-network

  gateway:
    build:
      context: ../gateway
      dockerfile: Dockerfile
    container_name: b2b-gateway
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: ${GATEWAY_PROFILES:-default}
      BACKEND_URL: http://backend:8080
      JWT_JWK_SET_URI: ${JWT_JWK_SET_URI:-}
      KEYCLOAK_URL: http://keycloak:8080
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:3001,http://localhost:3002}
    ports:
      - "8090:8090"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8090/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - dev-network

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_AUTH_MODE: ${AUTH_MODE:-clerk}
        NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY:-}
    container_name: b2b-frontend
    restart: unless-stopped
    environment:
      # Server-side API calls go through the gateway (mirrors production)
      BACKEND_URL: http://gateway:8090
      # Internal/webhook calls bypass gateway (not exposed externally)
      INTERNAL_BACKEND_URL: http://backend:8080
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      # Clerk (used when AUTH_MODE=clerk)
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY:-}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY:-}
      CLERK_WEBHOOK_SIGNING_SECRET: ${CLERK_WEBHOOK_SIGNING_SECRET:-}
      NEXT_PUBLIC_CLERK_SIGN_IN_URL: ${NEXT_PUBLIC_CLERK_SIGN_IN_URL:-/sign-in}
      NEXT_PUBLIC_CLERK_SIGN_UP_URL: ${NEXT_PUBLIC_CLERK_SIGN_UP_URL:-/sign-up}
      NEXT_PUBLIC_CLERK_SIGN_IN_FALLBACK_REDIRECT_URL: ${NEXT_PUBLIC_CLERK_SIGN_IN_FALLBACK_REDIRECT_URL:-/dashboard}
      NEXT_PUBLIC_CLERK_SIGN_UP_FALLBACK_REDIRECT_URL: ${NEXT_PUBLIC_CLERK_SIGN_UP_FALLBACK_REDIRECT_URL:-/dashboard}
      # Keycloak (used when AUTH_MODE=keycloak)
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-docteams-web}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET:-docteams-web-secret}
      KEYCLOAK_ISSUER: http://keycloak:8080/realms/docteams
      KEYCLOAK_ISSUER_EXTERNAL: http://localhost:9090/realms/docteams
      KEYCLOAK_DEFAULT_ORG: ${KEYCLOAK_DEFAULT_ORG:-}
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-local-dev-nextauth-secret-at-least-32-characters-long}
      AUTH_TRUST_HOST: "true"
    ports:
      - "3000:3000"
    depends_on:
      gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s
    networks:
      - dev-network

volumes:
  postgres_data:
  localstack_data:

networks:
  dev-network:
    driver: bridge
