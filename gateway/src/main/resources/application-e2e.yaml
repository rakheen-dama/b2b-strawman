# E2E testing profile — Docker network route URIs and relaxed rate limiting.
# JWT validation configured by the keycloak profile (activated via SPRING_PROFILES_ACTIVE=keycloak,e2e).
spring:
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: api
              uri: http://backend:8080
              predicates:
                - Path=/api/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: backendCircuitBreaker
                    fallbackUri: forward:/fallback

            - id: portal
              uri: http://backend:8080
              predicates:
                - Path=/portal/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: backendCircuitBreaker
                    fallbackUri: forward:/fallback

            - id: actuator-backend
              uri: http://backend:8080
              predicates:
                - Path=/backend/actuator/**
              filters:
                - StripPrefix=1

# Disable rate limiting in E2E tests to avoid flaky failures
gateway:
  rate-limit:
    enabled: false
